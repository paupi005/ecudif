<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcuDif</title>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #22d3ee;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 16px;
            color: var(--text-main);
        }

        .phone-mockup {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            min-height: 90vh;
            border-radius: 45px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            border: 8px solid #334155;
            overflow: hidden;
            margin: 0 auto;
        }

        /* En pantallas grandes se muestra centrado con más espacio */
        @media (min-width: 600px) {
            body {
                align-items: center;
                padding: 40px 20px;
            }
            .phone-mockup {
                min-height: unset;
            }
        }

        .header {
            padding: 30px 20px 5px;
            text-align: center;
        }

        .header h1 {
            color: var(--accent);
            font-size: clamp(1rem, 5vw, 1.4rem);
            margin: 0;
            letter-spacing: 2px;
        }

        .scan-area {
            background: rgba(15, 23, 42, 0.8);
            margin: 20px;
            padding: 40px 10px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .equation-display {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px 6px;
            font-size: clamp(0.9rem, 4vw, 1.3rem);
        }

        .term-group {
            display: flex;
            align-items: center;
            gap: 2px;
            white-space: nowrap;
        }

        input[type="number"] {
            width: clamp(30px, 8vw, 42px);
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--accent);
            color: white;
            text-align: center;
            font-size: clamp(0.9rem, 4vw, 1.3rem);
            font-family: 'Fira Code', monospace;
            outline: none;
            transition: 0.3s;
            padding: 2px 0;
        }

        input[type="number"]:focus {
            border-bottom-color: var(--primary);
            transform: translateY(-2px);
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }

        .var {
            font-style: italic;
            color: var(--text-main);
            font-weight: 500;
        }

        .op {
            color: var(--text-dim);
            font-weight: 300;
            min-width: 12px;
            text-align: center;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 20px 20px;
        }

        button {
            padding: 16px;
            border-radius: 18px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            letter-spacing: 0.5px;
        }

        .btn-metodo {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        .btn-metodo:hover { background: rgba(34, 211, 238, 0.08); }

        .btn-resolver {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
        }

        .btn-resolver:hover { opacity: 0.85; }

        #results-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 30px;
            display: none;
        }

        .step-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid var(--accent);
            animation: slideIn 0.4s ease-out;
        }

        .step-tag {
            color: var(--primary);
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .case-badge {
            display: inline-block;
            background: var(--accent);
            color: var(--bg);
            padding: 2px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 900;
            margin-top: 5px;
        }

        .error-msg {
            color: #f87171;
            font-size: 0.8rem;
            text-align: center;
            padding: 10px;
            background: rgba(248, 113, 113, 0.08);
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .mathjax-loading {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-align: center;
            padding: 8px;
            font-style: italic;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #results-scroll::-webkit-scrollbar { width: 4px; }
        #results-scroll::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>

<body>

<div class="phone-mockup">
    <div class="header">
        <h1>ECUDIF 2P</h1>
    </div>

    <div class="scan-area">
        <div class="equation-display">
            <div class="term-group">
                <input type="number" id="a" value="1" step="any" oninput="updateOps()">
                <span class="var">y''</span>
            </div>

            <span class="op" id="op1">+</span>

            <div class="term-group">
                <input type="number" id="b" value="-2" step="any" oninput="updateOps()">
                <span class="var">y'</span>
            </div>

            <span class="op" id="op2">+</span>

            <div class="term-group">
                <input type="number" id="c" value="1" step="any" oninput="updateOps()">
                <span class="var">y</span>
            </div>

            <span class="op">= 0</span>
        </div>
    </div>

    <div class="button-group">
        <button class="btn-metodo" onclick="display(true)">Método</button>
        <button class="btn-resolver" onclick="display(false)">Resolver</button>
    </div>

    <div id="results-scroll"></div>
</div>

<script>
    function updateOps() {
        const b = parseFloat(document.getElementById('b').value);
        const c = parseFloat(document.getElementById('c').value);
        document.getElementById('op1').textContent = (!isNaN(b) && b < 0) ? '−' : '+';
        document.getElementById('op2').textContent = (!isNaN(c) && c < 0) ? '−' : '+';
    }

    function fmt(n) {
        if (Number.isInteger(n)) return n;
        return parseFloat(n.toFixed(4));
    }

    function display(fullMethod) {
        const a = parseFloat(document.getElementById('a').value);
        const b = parseFloat(document.getElementById('b').value);
        const c = parseFloat(document.getElementById('c').value);
        const out = document.getElementById('results-scroll');

        out.innerHTML = "";
        out.style.display = "block";

        if (isNaN(a) || isNaN(b) || isNaN(c)) {
            out.innerHTML = '<div class="error-msg">⚠ Ingresa coeficientes válidos.</div>';
            return;
        }
        if (a === 0) {
            out.innerHTML = '<div class="error-msg">⚠ El coeficiente <em>a</em> no puede ser cero.</div>';
            return;
        }

        const D = (b * b) - (4 * a * c);

        let caseInfo = D > 0 ? "CASO I: Reales Distintas"
                     : D === 0 ? "CASO II: Raíces Iguales"
                     : "CASO III: Complejas";

        const signB = b >= 0 ? `+${fmt(b)}` : `${fmt(b)}`;
        const signC = c >= 0 ? `+${fmt(c)}` : `${fmt(c)}`;
        const charEq = `${fmt(a)}m^2 ${signB}m ${signC} = 0`;

        let steps = [];
        steps.push({ label: "1. Ecuación Característica", math: `\\[ ${charEq} \\]` });

        let rMath, m1, m2, alpha, beta;

        if (D > 0) {
            m1 = (-b + Math.sqrt(D)) / (2 * a);
            m2 = (-b - Math.sqrt(D)) / (2 * a);
            rMath = `m_1 = ${fmt(m1)}, \\quad m_2 = ${fmt(m2)}`;
        } else if (D === 0) {
            m1 = -b / (2 * a);
            rMath = `m_{1,2} = ${fmt(m1)}`;
        } else {
            alpha = -b / (2 * a);
            beta  = Math.sqrt(-D) / (2 * a);
            rMath = `m = ${fmt(alpha)} \\pm ${fmt(beta)}i`;
        }

        steps.push({
            label: "2. Raíces y Análisis",
            math: `\\[ ${rMath} \\]`,
            badge: caseInfo
        });

        let fMath;
        if (D > 0) {
            fMath = `y_1 = e^{${fmt(m1)}x}, \\quad y_2 = e^{${fmt(m2)}x}`;
        } else if (D === 0) {
            fMath = `y_1 = e^{${fmt(m1)}x}, \\quad y_2 = x\\,e^{${fmt(m1)}x}`;
        } else {
            fMath = alpha === 0
                ? `y_1 = \\cos(${fmt(beta)}x), \\quad y_2 = \\text{sen}(${fmt(beta)}x)`
                : `y_1 = e^{${fmt(alpha)}x}\\cos(${fmt(beta)}x), \\quad y_2 = e^{${fmt(alpha)}x}\\text{sen}(${fmt(beta)}x)`;
        }
        steps.push({ label: "3. Soluciones Fundamentales", math: `\\[ ${fMath} \\]` });

        let ycMath;
        if (D > 0) {
            ycMath = `Y_c = C_1 e^{${fmt(m1)}x} + C_2 e^{${fmt(m2)}x}`;
        } else if (D === 0) {
            ycMath = `Y_c = C_1 e^{${fmt(m1)}x} + C_2 x\\,e^{${fmt(m1)}x}`;
        } else {
            ycMath = alpha === 0
                ? `Y_c = C_1 \\cos(${fmt(beta)}x) + C_2 \\text{sen}(${fmt(beta)}x)`
                : `Y_c = e^{${fmt(alpha)}x}\\left[C_1 \\cos(${fmt(beta)}x) + C_2 \\text{sen}(${fmt(beta)}x)\\right]`;
        }
        steps.push({ label: "4. Solución General", math: `\\[ ${ycMath} \\]` });

        const toShow = fullMethod ? steps : [steps[3]];
        toShow.forEach(s => addCard(s.label, s.math, s.badge));

        // Espera a MathJax si aún está cargando
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise([out]).catch(console.error);
        } else {
            const note = document.createElement('div');
            note.className = 'mathjax-loading';
            note.textContent = 'Cargando renderizado de fórmulas...';
            out.appendChild(note);
            const interval = setInterval(() => {
                if (window.MathJax && MathJax.typesetPromise) {
                    clearInterval(interval);
                    out.removeChild(note);
                    MathJax.typesetPromise([out]).catch(console.error);
                }
            }, 300);
        }

        out.scrollTop = 0;
    }

    function addCard(label, math, badge) {
        const div = document.createElement('div');
        div.className = "step-card";
        let html = `<span class="step-tag">${label}</span><div class="math-content">${math}</div>`;
        if (badge) html += `<div class="case-badge">${badge}</div>`;
        div.innerHTML = html;
        document.getElementById('results-scroll').appendChild(div);
    }

    updateOps();
</script>

</body>
</html>
